project:
  name: human_mouse_pancreas_ocr
  output_dir: results
  temp_dir: tmp 
  verbose: false # detailed logging. set to false for cleaner terminal output.

cluster:
  use_sbatch: true
  allocation_id: bio230007p
  partition: RM-shared      # partition requested
  nodes: 1                  # number of nodes
  ntasks: 32                # number of cores to allocate per node
  mem: 64000MB              # passed to sbatch as --mem
  time: "72:00:00"          # walltime limit

# additional tools here as needed
# refer to README on how to get halLiftover-postprocessing.
tools: 
  orthologfind_py: ./external/halLiftover-postprocessing/orthologFind.py

# input files and parameters for the analysis
comparison:
  species_1_name: human
  species_2_name: mouse
  species_1_hal_name: Human # this should match the name in the HAL file
  species_2_hal_name: Mouse # this should match the name in the HAL file
  organ: pancreas

# peak files for the two species. These should be in narrowPeak format and can either be gzipped or not.
peaks:
  species_1_peak_file: ./data/HumanAtac/Pancreas/peak/idr_reproducibility/idr.optimal_peak.narrowPeak.gz
  species_2_peak_file: ./data/MouseAtac/Pancreas/peak/idr_reproducibility/idr.optimal_peak.narrowPeak.gz

# alignment file
alignments:
  hal_file: ./data/Alignments/10plusway-master.hal

# parameters for halLiftover-postprocessing. Refer to the documentation for more details.
# These parameters are the default parameters used in the original halLiftover-postprocessing repository, but you can adjust them as needed.
# https://github.com/pfenninglab/halLiftover-postprocessing#running-steps-manually
parameters:
  run_bidirectional_liftover: true
  min_peak_length: 50
  max_peak_length: 1000
  protect_dist: 5  # This is the protection distance parameter passed to orthologFind.py.

# specify which genome assemblies to use for rGREAT. 
# These should match the names in the HAL file and the annotation files.
# Refer to the rGREAT documentation for supported genome assemblies. 
# Please note that at this moment we only support rGREAT online analysis.
# “hg38”, “hg19”, “mm10”, “mm9” are supported in GREAT version 4.x.x.
# https://jokergoo.github.io/rGREAT/articles/online-GREAT.html
rGreat: 
  species_1_genome: hg38
  species_2_genome: mm10

# annotation files used for bedtools and Homer.
annotations:
  species_1_tss_file: ./data/HumanGenomeInfo/gencode.v27.annotation.protTranscript.TSSsWithStrand_sorted.bed
  species_2_tss_file: ./data/MouseGenomeInfo/gencode.vM15.annotation.protTranscript.geneNames_TSSWithStrand_sorted.bed
  species_1_genome_fasta: ./data/HumanGenomeInfo/hg38.fa # for Homer (second parameter findMotifsGenome.pl)
  species_2_genome_fasta: ./data/MouseGenomeInfo/mm10.fa # for Homer (second parameter for findMotifsGenome.pl)
  promoter_max_distance: 1000 # for promoter_enhancer.py. this is the maximum distance from TSS to consider a peak as promoter peak.


# DO NOT EDIT BELOW THIS LINE
  halper_outputs:
  species_1_to_species_2: ./results/halper/human_to_mouse/Human_to_Mouse.orthologs.bed
  species_2_to_species_1: ./results/halper/mouse_to_human/Mouse_to_Human.orthologs.bed